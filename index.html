<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无尽的拉格朗日 - 配舰星港模拟器</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#000;overflow:hidden;font-family:'Microsoft YaHei','PingFang SC',sans-serif;height:100vh;width:100vw}
        canvas{display:block;position:fixed;top:0;left:0;z-index:1}
        .overlay{position:fixed;z-index:10;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
        .title{font-size:clamp(2.2rem,7vw,4.5rem);font-weight:900;background:linear-gradient(180deg,#fff 0%,#4a9eff 40%,#00d4ff 70%,#ffd700 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;opacity:0;transform:translateY(30px)}
        .subtitle{font-size:clamp(0.9rem,2vw,1.3rem);color:rgba(255,255,255,0.55);letter-spacing:8px;margin-bottom:48px;opacity:0;transform:translateY(20px)}
        .btn-enter{pointer-events:auto;padding:18px 56px;font-size:1.2rem;font-weight:700;background:linear-gradient(135deg,rgba(74,158,255,0.25),rgba(0,212,255,0.15));border:1.5px solid rgba(74,158,255,0.5);border-radius:50px;color:#fff;cursor:pointer;letter-spacing:5px;backdrop-filter:blur(12px);transition:all 0.5s ease;text-decoration:none;display:inline-block;opacity:0;transform:translateY(20px)}
        .btn-enter:hover{background:linear-gradient(135deg,rgba(74,158,255,0.45),rgba(0,212,255,0.35));border-color:#4a9eff;box-shadow:0 0 60px rgba(74,158,255,0.5),inset 0 0 30px rgba(74,158,255,0.2);transform:scale(1.06)}
        .info{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:10;color:rgba(255,255,255,0.3);font-size:9px;letter-spacing:3px}
    </style>
</head>
<body>
    <div class="overlay">
        <div class="title" id="mainTitle">无尽的拉格朗日</div>
        <div class="subtitle" id="mainSub">配 舰 星 港 模 拟 器</div>
        <a href="simulator.html" class="btn-enter" id="btnEnter">⚓ 进 入 星 港</a>
    </div>
    <div class="info">游戏名:能二 | 编号:10636401507 | 163艘舰船</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script type="importmap">
        {"imports":{"three":"https://unpkg.com/three@0.157.0/build/three.module.js"}}
    </script>
    <script type="module">
        import * as THREE from 'three';

        // ── Scene ──
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(42, innerWidth/innerHeight, 0.1, 100);
        camera.position.set(0, 0.5, 8);
        camera.lookAt(0,0,0);

        const renderer = new THREE.WebGLRenderer({antialias:true,alpha:true});
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio,2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // ── Stars ──
        const starsG = new THREE.BufferGeometry();
        const sc = 3000, sp = new Float32Array(sc*3);
        for(let i=0;i<sc*3;i++) sp[i] = (Math.random()-0.5)*40;
        starsG.setAttribute('position',new THREE.BufferAttribute(sp,3));
        const stars = new THREE.Points(starsG,new THREE.PointsMaterial({color:0xffffff,size:0.015,transparent:true,opacity:0.9}));
        scene.add(stars);

        // ── Earth ──
        const earthG = new THREE.SphereGeometry(1.6, 80, 80);
        const loader = new THREE.TextureLoader();
        const earthM = new THREE.MeshStandardMaterial({
            map: loader.load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg'),
            roughness: 0.8, metalness: 0.1
        });
        const earth = new THREE.Mesh(earthG, earthM);
        scene.add(earth);

        // Atmosphere layers
        [1.62,1.65].forEach(r=>{
            const a = new THREE.Mesh(new THREE.SphereGeometry(r,64,64),
                new THREE.ShaderMaterial({
                    vertexShader:`varying vec3 vN;void main(){vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
                    fragmentShader:`varying vec3 vN;void main(){float i=pow(0.6-dot(vN,vec3(0,0,1)),3.0);gl_FragColor=vec4(0.29,0.62,1.0,i*0.35);}`,
                    side:THREE.BackSide,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true
                }));
            scene.add(a);
        });

        // ── INDUSTRIAL RING STATION ──
        const ringGroup = new THREE.Group();
        scene.add(ringGroup);

        // Main ring - thick dark metal
        const mainRingG = new THREE.TorusGeometry(2.25, 0.08, 24, 160);
        const mainRing = new THREE.Mesh(mainRingG, new THREE.MeshStandardMaterial({
            color:0x3a3a40, roughness:0.55, metalness:0.95
        }));
        ringGroup.add(mainRing);

        // Outer highlighted edge ring
        const edgeRingG = new THREE.TorusGeometry(2.33, 0.02, 16, 160);
        const edgeRing = new THREE.Mesh(edgeRingG, new THREE.MeshStandardMaterial({
            color:0xffaa40, roughness:0.2, metalness:0.8, emissive:0x553300, emissiveIntensity:0.8
        }));
        ringGroup.add(edgeRing);

        // Inner structural ring - darker
        const innerRingG = new THREE.TorusGeometry(2.17, 0.04, 16, 140);
        const innerRing = new THREE.Mesh(innerRingG, new THREE.MeshStandardMaterial({
            color:0x2a2a30, roughness:0.7, metalness:0.9
        }));
        ringGroup.add(innerRing);

        // Truss ring - thin cross-bracing
        const trussG = new THREE.TorusGeometry(2.21, 0.01, 8, 200);
        const truss = new THREE.Mesh(trussG, new THREE.MeshStandardMaterial({
            color:0x555560, roughness:0.3, metalness:0.85
        }));
        ringGroup.add(truss);

        // Gold light strip - emissive
        const goldStripG = new THREE.TorusGeometry(2.25, 0.015, 8, 200);
        const goldStrip = new THREE.Mesh(goldStripG, new THREE.MeshBasicMaterial({color:0xffcc66}));
        ringGroup.add(goldStrip);

        // Platform modules along the ring
        const platG = new THREE.BoxGeometry(0.18, 0.06, 0.08);
        const platM = new THREE.MeshStandardMaterial({color:0x4a4a55, roughness:0.5, metalness:0.9});
        const glowM = new THREE.MeshBasicMaterial({color:0xff9930});

        const modules = [];
        for(let i=0;i<12;i++){
            const angle = (i/12)*Math.PI*2;
            const plat = new THREE.Mesh(platG, platM);
            plat.position.set(Math.cos(angle)*2.25, Math.sin(angle)*2.25, 0);
            plat.rotation.z = angle;

            // Glow point on each module
            const glowG = new THREE.SphereGeometry(0.03,8,8);
            const glow = new THREE.Mesh(glowG, glowM);
            glow.position.copy(plat.position);
            glow.position.x += Math.cos(angle)*0.09;
            glow.position.y += Math.sin(angle)*0.09;

            ringGroup.add(plat, glow);
            modules.push({plat,glow,angle});
        }

        // Vertical truss beams connecting inner/outer rings
        for(let i=0;i<40;i++){
            const angle = (i/40)*Math.PI*2;
            const beamG = new THREE.CylinderGeometry(0.008,0.008,0.16,6);
            const beam = new THREE.Mesh(beamG, new THREE.MeshStandardMaterial({color:0x3a3a45,roughness:0.6,metalness:0.85}));
            beam.position.set(Math.cos(angle)*2.25, Math.sin(angle)*2.25, 0);
            beam.rotation.z = Math.PI/2;
            beam.rotation.y = -angle;
            ringGroup.add(beam);
        }

        // Rotate ring 90° so it stands vertically around Earth
        ringGroup.rotation.x = Math.PI/2;

        // ── Space dust particles near ring ──
        const dustG = new THREE.BufferGeometry();
        const dc = 500, dp = new Float32Array(dc*3);
        for(let i=0;i<dc*3;i+=3){
            const a = Math.random()*Math.PI*2;
            const r = 2.1+Math.random()*0.5;
            dp[i]=Math.cos(a)*r;dp[i+1]=(Math.random()-0.5)*0.3;dp[i+2]=Math.sin(a)*r;
        }
        dustG.setAttribute('position',new THREE.BufferAttribute(dp,3));
        const dust = new THREE.Points(dustG,new THREE.PointsMaterial({color:0xffcc88,size:0.012,transparent:true,opacity:0.6,blending:THREE.AdditiveBlending,depthWrite:false}));
        ringGroup.add(dust);

        // ── Lights ──
        const sun = new THREE.DirectionalLight(0xffeedd, 3.5);
        sun.position.set(8, 5, 6);
        scene.add(sun);
        const fill = new THREE.DirectionalLight(0x4466aa, 0.6);
        fill.position.set(-3, -1, -2);
        scene.add(fill);
        const amb = new THREE.AmbientLight(0x1a1a2e, 1.8);
        scene.add(amb);
        // Point light near ring for warm glow
        const ptL = new THREE.PointLight(0xff9944, 2, 5);
        ptL.position.set(3, 1, 0);
        scene.add(ptL);

        // ── Animation ──
        function animate(){
            requestAnimationFrame(animate);
            earth.rotation.y += 0.0015;
            ringGroup.rotation.z -= 0.002; // clockwise
            stars.rotation.y += 0.00015;
            dust.rotation.z += 0.001;
            renderer.render(scene, camera);
        }
        animate();

        // ── Mouse ──
        document.addEventListener('mousemove', e=>{
            const mx=(e.clientX/innerWidth-0.5)*1.2, my=(e.clientY/innerHeight-0.5)*0.8;
            gsap.to(camera.position,{x:mx*1.5,y:0.5+my*1.2,duration:1.5,ease:'power2.out'});
            camera.lookAt(mx*0.3, my*0.2, 0);
        });

        // ── GSAP entrance ──
        gsap.to('#mainTitle',{opacity:1,y:0,duration:1.2,delay:0.4,ease:'power3.out'});
        gsap.to('#mainSub',{opacity:1,y:0,duration:1,duration:1,delay:0.8,ease:'power2.out'});
        gsap.to('#btnEnter',{opacity:1,y:0,duration:0.9,delay:1.3,ease:'back.out(1.5)'});

        // ── Resize ──
        window.addEventListener('resize',()=>{
            camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
            renderer.setSize(innerWidth,innerHeight);
        });
    </script>
</body>
</html>
