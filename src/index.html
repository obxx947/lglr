<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无尽的拉格朗日 - 配舰星港模拟器</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            background:#000;overflow:hidden;font-family:'Microsoft YaHei','PingFang SC',sans-serif;
            height:100vh;width:100vw;
        }
        canvas{display:block;position:fixed;top:0;left:0;z-index:1;}
        .overlay{
            position:fixed;z-index:10;top:0;left:0;right:0;bottom:0;
            display:flex;flex-direction:column;align-items:center;justify-content:center;
            pointer-events:none;
        }
        .title{
            font-size:clamp(2rem,6vw,4rem);font-weight:900;
            background:linear-gradient(135deg,#4a9eff 0%,#00d4ff 30%,#fff 60%,#ffd700 100%);
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;
            text-shadow:none;margin-bottom:8px;
        }
        .subtitle{
            font-size:clamp(0.9rem,2vw,1.3rem);color:rgba(255,255,255,0.6);
            letter-spacing:6px;margin-bottom:40px;
        }
        .btn-enter{
            pointer-events:auto;
            padding:16px 48px;font-size:1.2rem;font-weight:700;
            background:linear-gradient(135deg,rgba(74,158,255,0.3),rgba(0,212,255,0.2));
            border:2px solid rgba(74,158,255,0.6);border-radius:50px;
            color:#fff;cursor:pointer;letter-spacing:4px;
            backdrop-filter:blur(10px);
            transition:all 0.4s ease;
            text-decoration:none;display:inline-block;
        }
        .btn-enter:hover{
            background:linear-gradient(135deg,rgba(74,158,255,0.5),rgba(0,212,255,0.4));
            border-color:#4a9eff;box-shadow:0 0 40px rgba(74,158,255,0.5);
            transform:scale(1.05);
        }
        .info{
            position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:10;
            color:rgba(255,255,255,0.4);font-size:10px;letter-spacing:2px;
        }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="title">无尽的拉格朗日</div>
        <div class="subtitle">配 舰 星 港 模 拟 器</div>
        <a href="simulator.html" class="btn-enter">⚓ 进 入 星 港</a>
    </div>
    <div class="info">游戏名:能二 | 编号:10636401507 | 163艘舰船 | GitHub Pages</div>

    <script type="importmap">
        {"imports":{"three":"https://unpkg.com/three@0.157.0/build/three.module.js"}}
    </script>
    <script type="module">
        import * as THREE from 'three';

        // Scene setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.z = 6;
        
        const renderer = new THREE.WebGLRenderer({antialias:true,alpha:true});
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
        document.body.appendChild(renderer.domElement);

        // Stars background
        const starsGeo = new THREE.BufferGeometry();
        const starCount = 2000;
        const starsPos = new Float32Array(starCount*3);
        for(let i=0;i<starCount*3;i++) starsPos[i] = (Math.random()-0.5)*30;
        starsGeo.setAttribute('position',new THREE.BufferAttribute(starsPos,3));
        const starsMat = new THREE.PointsMaterial({color:0xffffff,size:0.02,transparent:true,opacity:0.8});
        const stars = new THREE.Points(starsGeo,starsMat);
        scene.add(stars);

        // Earth
        const earthGeo = new THREE.SphereGeometry(1.5,64,64);
        const earthTex = new THREE.TextureLoader().load(
            'https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg',
            ()=>{/* loaded */}
        );
        const earthMat = new THREE.MeshPhongMaterial({
            map:earthTex,
            specular:0x111111,
            shininess:5
        });
        const earth = new THREE.Mesh(earthGeo,earthMat);
        scene.add(earth);

        // Atmosphere glow
        const atmoGeo = new THREE.SphereGeometry(1.52,64,64);
        const atmoMat = new THREE.MeshPhongMaterial({
            color:0x4a9eff,
            transparent:true,opacity:0.1,
            side:THREE.BackSide
        });
        const atmosphere = new THREE.Mesh(atmoGeo,atmoMat);
        scene.add(atmosphere);

        // Space station ring - vertical torus orbiting Earth
        const ringGeo = new THREE.TorusGeometry(2.0,0.04,16,120);
        const ringMat = new THREE.MeshStandardMaterial({
            color:0x00d4ff,
            emissive:0x004466,
            roughness:0.3,
            metalness:0.8
        });
        const ring = new THREE.Mesh(ringGeo,ringMat);
        ring.rotation.x = Math.PI/2; // Make it vertical (like a ring around Earth)
        scene.add(ring);

        // Small station modules on the ring
        const moduleGeo = new THREE.BoxGeometry(0.08,0.05,0.05);
        const moduleMat = new THREE.MeshStandardMaterial({color:0xffd700,emissive:0x332200,metalness:0.9});
        const modules = [];
        for(let i=0;i<8;i++){
            const mod = new THREE.Mesh(moduleGeo,moduleMat);
            const angle = (i/8)*Math.PI*2;
            mod.position.set(Math.cos(angle)*2.0, 0, Math.sin(angle)*2.0);
            ring.add(mod);
            modules.push({mesh:mod,angle});
        }

        // Second thinner ring
        const ring2Geo = new THREE.TorusGeometry(2.15,0.02,16,100);
        const ring2Mat = new THREE.MeshStandardMaterial({
            color:0xffd700,
            emissive:0x221100,
            roughness:0.2,
            metalness:0.9
        });
        const ring2 = new THREE.Mesh(ring2Geo,ring2Mat);
        ring2.rotation.x = Math.PI/2 + 0.3;
        scene.add(ring2);

        // Lights
        const sunLight = new THREE.DirectionalLight(0xffffff,2);
        sunLight.position.set(5,3,5);
        scene.add(sunLight);
        const ambientLight = new THREE.AmbientLight(0x222244,1.5);
        scene.add(ambientLight);
        const backLight = new THREE.DirectionalLight(0x4488ff,0.5);
        backLight.position.set(-3,-1,-3);
        scene.add(backLight);

        // Animation
        function animate(){
            requestAnimationFrame(animate);
            
            // Earth rotation
            earth.rotation.y += 0.002;
            atmosphere.rotation.y += 0.0015;
            
            // Ring rotation (clockwise - negative direction)
            ring.rotation.z -= 0.003;
            ring2.rotation.z -= 0.002;
            
            // Stars slowly rotate
            stars.rotation.y += 0.0002;
            stars.rotation.x += 0.0001;
            
            renderer.render(scene,camera);
        }
        animate();

        // Resize handler
        window.addEventListener('resize',()=>{
            camera.aspect = window.innerWidth/window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth,window.innerHeight);
        });

        // Mouse parallax
        document.addEventListener('mousemove',(e)=>{
            const x = (e.clientX/window.innerWidth-0.5)*0.3;
            const y = (e.clientY/window.innerHeight-0.5)*0.3;
            earth.rotation.x = y*0.5;
            ring.rotation.x = Math.PI/2 + y*0.3;
            ring2.rotation.x = Math.PI/2 + 0.3 + y*0.2;
        });
    </script>
</body>
</html>
